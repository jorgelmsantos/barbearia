<!DOCTYPE html>
<html>
<head>
  <title>Barbearia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .card {
      background: #1e1e1e;
      padding: 20px;
      margin: 20px auto;
      width: 320px;
      border-radius: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #00c853;
      color: white;
      font-weight: bold;
    }

    .hora {
      display: inline-block;
      padding: 10px;
      margin: 5px;
      background: #2a2a2a;
      cursor: pointer;
      border-radius: 8px;
    }

    .hora:hover {
      background: #444;
    }

    .selecionado {
      background: #00c853 !important;
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<h1>💈 Barbearia</h1>

<div class="card">
  <input id="nome" placeholder="Seu nome">
  <input id="telefone" placeholder="Telefone" oninput="mascaraTelefone(this)">

  <select id="servico" onchange="atualizarPreco()"></select>

  <p id="preco">Valor: R$0</p>

  <select id="barbeiro" onchange="gerarHorarios(); carregarHorariosOcupados();"></select>

  <input type="date" id="data" onchange="gerarHorarios(); carregarHorariosOcupados();">

  <div id="horarios"></div>

  <button onclick="agendar()">Agendar</button>
</div>

<script>

// 🔥 SUA API ONLINE
const API_URL = "https://barbearia-api.onrender.com";

let horaSelecionada = null;

// ================= HORÁRIOS =================
function gerarHorarios() {
  const container = document.getElementById('horarios');
  container.innerHTML = '';

  const horarios = [
    "09:00","09:30","10:00","10:30",
    "11:00","11:30","14:00","14:30",
    "15:00","15:30","16:00"
  ];

  horarios.forEach(h => {
    const div = document.createElement('div');
    div.innerText = h;
    div.className = 'hora';

    div.onclick = () => {
      document.querySelectorAll('.hora').forEach(el => el.classList.remove('selecionado'));
      div.classList.add('selecionado');
      horaSelecionada = h;
    };

    container.appendChild(div);
  });
}

// ================= AGENDAR =================
async function agendar() {
  const nome = document.getElementById('nome').value.trim();
  const telefone = document.getElementById('telefone').value.trim();

  const servicoSelect = document.getElementById('servico');
  const servicoTexto = servicoSelect.options[servicoSelect.selectedIndex].text;
  const valor = servicoSelect.value;

  const barbeiro = document.getElementById('barbeiro').value;
  const data = document.getElementById('data').value;

  if (!nome || !telefone || !data || !barbeiro) {
    alert('Preencha todos os campos');
    return;
  }

  if (!horaSelecionada) {
    alert('Selecione um horário');
    return;
  }

  try {
    const res = await fetch(`${API_URL}/agendamentos`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nomeCliente: nome,
        telefone,
        servico: servicoTexto,
        valor,
        barbeiro,
        data,
        hora: horaSelecionada
      })
    });

    const dataResponse = await res.json();

    if (!res.ok) {
      alert(dataResponse.erro || 'Erro ao agendar');
      return;
    }

    alert('✅ Agendamento realizado!');

    document.getElementById('nome').value = '';
    document.getElementById('telefone').value = '';
    document.getElementById('data').value = '';
    horaSelecionada = null;

    gerarHorarios();
    carregarHorariosOcupados();

  } catch (erro) {
    console.error(erro);
    alert('Erro ao conectar com o servidor');
  }
}

// ================= TELEFONE =================
function mascaraTelefone(input) {
  let valor = input.value.replace(/\D/g, '');

  if (valor.length > 11) valor = valor.slice(0, 11);

  if (valor.length > 6) {
    input.value = `(${valor.slice(0,2)}) ${valor.slice(2,7)}-${valor.slice(7)}`;
  } else if (valor.length > 2) {
    input.value = `(${valor.slice(0,2)}) ${valor.slice(2)}`;
  } else {
    input.value = valor;
  }
}

// ================= PREÇO =================
function atualizarPreco() {
  const select = document.getElementById('servico');
  const preco = select.value;
  document.getElementById('preco').innerText = `Valor: R$ ${preco}`;
}

// ================= BLOQUEAR HORÁRIOS =================
async function carregarHorariosOcupados() {
  const data = document.getElementById('data').value;
  const barbeiro = document.getElementById('barbeiro').value;

  if (!data || !barbeiro) return;

  const res = await fetch(`${API_URL}/agendamentos`);
  const lista = await res.json();

  const ocupados = lista
    .filter(a => a.data === data && a.barbeiro === barbeiro)
    .map(a => a.hora);

  document.querySelectorAll('.hora').forEach(div => {
    if (ocupados.includes(div.innerText)) {
      div.style.background = '#555';
      div.style.pointerEvents = 'none';
    }
  });
}

// ================= DADOS DINÂMICOS =================
async function carregarBarbeiros() {
  const res = await fetch(`${API_URL}/barbeiros`);
  const lista = await res.json();

  const select = document.getElementById('barbeiro');
  select.innerHTML = '';

  lista.forEach(b => {
    const option = document.createElement('option');
    option.value = b.nome;
    option.text = b.nome;
    select.appendChild(option);
  });
}

async function carregarServicos() {
  const res = await fetch(`${API_URL}/servicos`);
  const lista = await res.json();

  const select = document.getElementById('servico');
  select.innerHTML = '';

  lista.forEach(s => {
    const option = document.createElement('option');
    option.value = s.preco;
    option.text = `${s.nome} - R$ ${s.preco}`;
    select.appendChild(option);
  });

  atualizarPreco();
}

// ================= INIT =================
gerarHorarios();
carregarBarbeiros();
carregarServicos();

</script>

</body>
</html>
