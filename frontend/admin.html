<!DOCTYPE html>
<html>
<head>
  <title>Painel Barbearia PRO</title>

  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 { margin-bottom: 15px; }

    .menu {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .menu button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1e1e1e;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .menu button:hover {
      background: #00c853;
    }

    .subMenu {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .box {
      background: #2a2a2a;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #00c853;
      color: white;
      cursor: pointer;
    }

    .list-card {
      background: #2a2a2a;
      padding: 10px;
      border-radius: 8px;
      margin: 5px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .danger {
      background: #ff5252;
    }

    .receita { color: #00e676; }
    .despesa { color: #ff5252; }

  </style>
</head>

<body>

<h1>💈 Painel Barbearia PRO</h1>

<div class="menu">
  <button onclick="mostrar('dashboard')">📊 Dashboard</button>
  <button onclick="mostrar('financeiro')">💰 Financeiro</button>
  <button onclick="mostrar('barbeiros')">✂️ Barbeiros</button>
  <button onclick="mostrar('servicos')">💼 Serviços</button>
  <button onclick="mostrar('agenda')">📅 Agenda</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card">
  <h2>📊 Visão Geral</h2>

  <div class="grid">
    <div class="box" id="dia"></div>
    <div class="box" id="mes"></div>
    <div class="box" id="atendimentos"></div>
    <div class="box" id="topServico"></div>
  </div>
</div>

<!-- FINANCEIRO -->
<div id="financeiro" class="card" style="display:none;">
  <h2>💰 Financeiro</h2>

  <div class="subMenu">
    <button onclick="sub('receitas')">Receitas</button>
    <button onclick="sub('despesas')">Despesas</button>
  </div>

  <!-- RECEITAS -->
  <div id="receitas">
    <h3>Entradas (Agendamentos)</h3>
    <div id="listaReceitas"></div>
  </div>

  <!-- DESPESAS -->
  <div id="despesas" style="display:none;">
    <h3>Contas a pagar</h3>

    <input id="descDespesa" placeholder="Descrição">
    <input id="valorDespesa" placeholder="Valor">
    <button onclick="addDespesa()">Adicionar</button>

    <div id="listaDespesas"></div>
  </div>
</div>

<!-- BARBEIROS -->
<div id="barbeiros" class="card" style="display:none;">
  <h2>Barbeiros</h2>

  <input id="nomeBarbeiro" placeholder="Nome">
  <button onclick="cadastrarBarbeiro()">Cadastrar</button>

  <div id="listaBarbeiros"></div>
</div>

<!-- SERVIÇOS -->
<div id="servicos" class="card" style="display:none;">
  <h2>Serviços</h2>

  <input id="nomeServico" placeholder="Nome">
  <input id="precoServico" placeholder="Preço">
  <button onclick="cadastrarServico()">Cadastrar</button>

  <div id="listaServicos"></div>
</div>

<!-- AGENDA -->
<div id="agenda" class="card" style="display:none;">
  <h2>Agenda</h2>
  <div id="listaAgenda"></div>
</div>

<script src="config.js"></script>

<script>

// ================= MENU =================
function mostrar(id){
  ['dashboard','financeiro','barbeiros','servicos','agenda']
    .forEach(x => document.getElementById(x).style.display='none');

  document.getElementById(id).style.display='block';
}

function sub(id){
  ['receitas','despesas']
    .forEach(x => document.getElementById(x).style.display='none');

  document.getElementById(id).style.display='block';
}

// ================= BARBEIROS =================
async function cadastrarBarbeiro(){
  await fetch(`${API_URL}/barbeiros`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ nome:nomeBarbeiro.value })
  });

  nomeBarbeiro.value='';
  carregarBarbeiros();
}

async function carregarBarbeiros(){
  let lista = await fetch(`${API_URL}/barbeiros`).then(r=>r.json());

  listaBarbeiros.innerHTML='';

  lista.forEach(b=>{
    listaBarbeiros.innerHTML += `
      <div class="list-card">
        ${b.nome}
        <button class="danger" onclick="delBarbeiro('${b._id}')">X</button>
      </div>
    `;
  });
}

async function delBarbeiro(id){
  await fetch(`${API_URL}/barbeiros/${id}`,{method:'DELETE'});
  carregarBarbeiros();
}

// ================= SERVIÇOS =================
async function cadastrarServico(){
  await fetch(`${API_URL}/servicos`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      nome:nomeServico.value,
      preco:precoServico.value
    })
  });

  nomeServico.value='';
  precoServico.value='';
  carregarServicos();
}

async function carregarServicos(){
  let lista = await fetch(`${API_URL}/servicos`).then(r=>r.json());

  listaServicos.innerHTML='';

  lista.forEach(s=>{
    listaServicos.innerHTML += `
      <div class="list-card">
        ${s.nome} - R$ ${s.preco}
        <button class="danger" onclick="delServico('${s._id}')">X</button>
      </div>
    `;
  });
}

async function delServico(id){
  await fetch(`${API_URL}/servicos/${id}`,{method:'DELETE'});
  carregarServicos();
}

// ================= FINANCEIRO =================
async function carregarFinanceiro(){
  let ag = await fetch(`${API_URL}/agendamentos`).then(r=>r.json());

  listaReceitas.innerHTML='';

  ag.filter(a=>a.status!=='cancelado').forEach(a=>{
    listaReceitas.innerHTML += `
      <div class="list-card receita">
        ${a.servico} - R$ ${a.valor}
      </div>
    `;
  });

  // DASHBOARD
  let hoje = new Date().toISOString().split('T')[0];

  let receitaDia = ag
    .filter(a=>a.data===hoje && a.status!=='cancelado')
    .reduce((s,a)=>s+a.valor,0);

  let receitaMes = ag
    .filter(a=>a.status!=='cancelado')
    .reduce((s,a)=>s+a.valor,0);

  dia.innerText = `Hoje: R$ ${receitaDia}`;
  mes.innerText = `Mês: R$ ${receitaMes}`;
  atendimentos.innerText = `Atendimentos: ${ag.length}`;
}

// ================= DESPESAS =================
async function addDespesa(){
  await fetch(`${API_URL}/despesas`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      descricao:descDespesa.value,
      valor:valorDespesa.value
    })
  });

  descDespesa.value='';
  valorDespesa.value='';

  carregarDespesas();
}

async function carregarDespesas(){
  let lista = await fetch(`${API_URL}/despesas`).then(r=>r.json());

  listaDespesas.innerHTML='';

  lista.forEach(d=>{
    listaDespesas.innerHTML += `
      <div class="list-card despesa">
        ${d.descricao} - R$ ${d.valor}
      </div>
    `;
  });
}

// ================= AGENDA =================
async function carregarAgenda(){
  let lista = await fetch(`${API_URL}/agendamentos`).then(r=>r.json());

  listaAgenda.innerHTML='';

  lista.forEach(a=>{
    listaAgenda.innerHTML += `
      <div class="list-card">
        ${a.nomeCliente} - ${a.servico} - ${a.data} ${a.hora}
      </div>
    `;
  });
}

// ================= INIT =================
carregarBarbeiros();
carregarServicos();
carregarFinanceiro();
carregarDespesas();
carregarAgenda();

setInterval(()=>{
  carregarFinanceiro();
  carregarAgenda();
},5000);

</script>

</body>
</html>
