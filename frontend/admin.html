<!DOCTYPE html>
<html>
<head>
  <title>Painel Admin</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
    }

    .topbar {
      background:#1e1e1e;
      padding:15px;
      font-size:20px;
      text-align:center;
    }

    .menu {
      display:flex;
      background:#181818;
    }

    .menu button {
      flex:1;
      padding:15px;
      border:none;
      background:none;
      color:white;
      cursor:pointer;
    }

    .menu button:hover {
      background:#00c853;
    }

    .container {
      padding:20px;
    }

    .grid {
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    .card {
      background:#1e1e1e;
      padding:15px;
      border-radius:10px;
      flex:1;
      min-width:200px;
      text-align:center;
    }

    input, button {
      padding:10px;
      margin:5px;
      border-radius:6px;
      border:none;
    }

    button {
      background:#00c853;
      color:white;
      cursor:pointer;
    }

    .lista-item {
      background:#2a2a2a;
      padding:10px;
      margin:5px 0;
      border-radius:8px;
      display:flex;
      justify-content:space-between;
    }

    .pedido {
      background:#2a2a2a;
      padding:10px;
      margin:10px 0;
      border-radius:8px;
    }

    .cancelado {
      text-decoration:line-through;
      color:red;
    }
  </style>
</head>

<body>

<div class="topbar">💈 Painel Admin</div>

<div class="menu">
  <button onclick="mostrar('dashboard')">📊 Dashboard</button>
  <button onclick="mostrar('financeiro')">💰 Financeiro</button>
  <button onclick="mostrar('agenda')">📅 Agenda</button>
  <button onclick="mostrar('cadastros')">⚙️ Cadastros</button>
</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="grid">
    <div class="card" id="totalAtendimentos"></div>
    <div class="card" id="faturamento"></div>
    <div class="card" id="ticketMedio"></div>
    <div class="card" id="maisVendido"></div>
  </div>
</div>

<!-- FINANCEIRO -->
<div id="financeiro" style="display:none;">

  <h2>💰 Fluxo de Caixa</h2>

  <div class="grid">
    <div class="card" id="receitas"></div>
    <div class="card" id="despesas"></div>
    <div class="card" id="saldo"></div>
  </div>

  <h3>Cadastrar despesa</h3>
  <input id="descDespesa" placeholder="Descrição">
  <input id="valorDespesa" placeholder="Valor">
  <button onclick="addDespesa()">Adicionar</button>

  <div id="listaDespesas"></div>
</div>

<!-- AGENDA -->
<div id="agenda" style="display:none;">
  <h2>📅 Agendamentos</h2>

  <input type="date" id="filtroData" onchange="filtrar()">

  <div id="listaPedidos"></div>
</div>

<!-- CADASTROS -->
<div id="cadastros" style="display:none;">

  <h2>✂️ Barbeiros</h2>
  <input id="nomeBarbeiro" placeholder="Nome">
  <button onclick="cadastrarBarbeiro()">Cadastrar</button>
  <div id="listaBarbeiros"></div>

  <h2>💰 Serviços</h2>
  <input id="nomeServico" placeholder="Nome">
  <input id="precoServico" placeholder="Preço">
  <button onclick="cadastrarServico()">Cadastrar</button>
  <div id="listaServicos"></div>

</div>

</div>

<script src="config.js"></script>

<script>

// ================= MENU =================
function mostrar(sec){
  ['dashboard','financeiro','agenda','cadastros'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });
  document.getElementById(sec).style.display='block';
}

// ================= GLOBAL =================
let agendamentos = [];
let despesas = [];

// ================= DASHBOARD =================
function renderDashboard(){
  const ativos = agendamentos.filter(a=>a.status !== 'cancelado');

  const total = ativos.length;
  const faturamento = ativos.reduce((s,a)=>s+(a.valor||0),0);
  const ticket = total ? (faturamento/total).toFixed(2) : 0;

  const cont = {};
  ativos.forEach(a=>{
    cont[a.servico]=(cont[a.servico]||0)+1;
  });

  let top = Object.entries(cont).sort((a,b)=>b[1]-a[1])[0];

  totalAtendimentos.innerText = `📅 ${total}`;
  faturamento.innerText = `💰 R$ ${faturamento}`;
  ticketMedio.innerText = `🎯 R$ ${ticket}`;
  maisVendido.innerText = `🔥 ${top ? top[0] : '-'}`;
}

// ================= FINANCEIRO =================
function renderFinanceiro(){
  const receitas = agendamentos
    .filter(a=>a.status !== 'cancelado')
    .reduce((s,a)=>s+(a.valor||0),0);

  const totalDespesas = despesas.reduce((s,d)=>s+d.valor,0);

  receitasDiv.innerText = `Receitas: R$ ${receitas}`;
  despesasDiv.innerText = `Despesas: R$ ${totalDespesas}`;
  saldoDiv.innerText = `Saldo: R$ ${receitas - totalDespesas}`;

  listaDespesas.innerHTML='';
  despesas.forEach(d=>{
    let div=document.createElement('div');
    div.className='lista-item';
    div.innerText = `${d.desc} - R$ ${d.valor}`;
    listaDespesas.appendChild(div);
  });
}

function addDespesa(){
  despesas.push({
    desc: descDespesa.value,
    valor: Number(valorDespesa.value)
  });

  descDespesa.value='';
  valorDespesa.value='';

  renderFinanceiro();
}

// refs
const receitasDiv = document.getElementById('receitas');
const despesasDiv = document.getElementById('despesas');
const saldoDiv = document.getElementById('saldo');

// ================= AGENDA =================
function agrupar(lista){
  const g={};
  lista.forEach(a=>{
    if(!g[a.grupoId]) g[a.grupoId]=[];
    g[a.grupoId].push(a);
  });
  return Object.values(g);
}

function renderAgenda(lista){
  listaPedidos.innerHTML='';

  agrupar(lista).forEach(grupo=>{
    let total=0;

    let div=document.createElement('div');
    div.className='pedido';

    let html='';

    grupo.forEach(a=>{
      if(a.status!=='cancelado') total+=a.valor||0;

      html+=`
        <div class="${a.status==='cancelado'?'cancelado':''}">
          ${a.nomeCliente} - ${a.servico} - ${a.data} ${a.hora}
          ${a.status!=='cancelado'
            ? `<button onclick="cancelar('${a._id}')">❌</button>`
            : ''
          }
        </div>
      `;
    });

    html+=`<b>Total: R$ ${total}</b>`;

    div.innerHTML=html;
    listaPedidos.appendChild(div);
  });
}

function filtrar(){
  const d = filtroData.value;
  if(!d) return renderAgenda(agendamentos);

  renderAgenda(agendamentos.filter(a=>a.data===d));
}

// ================= CANCELAR =================
async function cancelar(id){
  await fetch(`${API_URL}/agendamentos/${id}/cancelar`,{method:'PUT'});
  carregar();
}

// ================= CADASTROS =================
async function cadastrarBarbeiro(){
  await fetch(`${API_URL}/barbeiros`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({nome:nomeBarbeiro.value})
  });
  nomeBarbeiro.value='';
  carregarBarbeiros();
}

async function cadastrarServico(){
  await fetch(`${API_URL}/servicos`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      nome:nomeServico.value,
      preco:precoServico.value
    })
  });
  nomeServico.value='';
  precoServico.value='';
  carregarServicos();
}

async function carregarBarbeiros(){
  let lista = await fetch(`${API_URL}/barbeiros`).then(r=>r.json());
  listaBarbeiros.innerHTML='';
  lista.forEach(b=>{
    let div=document.createElement('div');
    div.className='lista-item';
    div.innerText=b.nome;
    listaBarbeiros.appendChild(div);
  });
}

async function carregarServicos(){
  let lista = await fetch(`${API_URL}/servicos`).then(r=>r.json());
  listaServicos.innerHTML='';
  lista.forEach(s=>{
    let div=document.createElement('div');
    div.className='lista-item';
    div.innerText=`${s.nome} - R$ ${s.preco}`;
    listaServicos.appendChild(div);
  });
}

// ================= LOAD =================
async function carregar(){
  agendamentos = await fetch(`${API_URL}/agendamentos`).then(r=>r.json());

  renderAgenda(agendamentos);
  renderDashboard();
  renderFinanceiro();
}

// ================= INIT =================
carregar();
carregarBarbeiros();
carregarServicos();

</script>

</body>
</html>
