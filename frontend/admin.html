<!DOCTYPE html>
<html>
<head>
  <title>Painel Barbearia</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      background: #020617;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 20px;
    }

    .menu {
      display: flex;
      gap: 10px;
      background: #020617;
      padding: 10px;
    }

    .menu button {
      flex: 1;
      padding: 12px;
      background: #1e293b;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .menu button:hover {
      background: #22c55e;
    }

    .container {
      padding: 20px;
    }

    .dashboard {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      flex: 1;
      min-width: 200px;
      text-align: center;
    }

    .section {
      display: none;
      margin-top: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .pedido {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }

    .item {
      margin: 5px 0;
      padding: 8px;
      border-radius: 6px;
      background: #334155;
    }

    .cancelado {
      background: #7f1d1d;
      text-decoration: line-through;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>

<body>

<header>
  <h1>💈 Painel Barbearia</h1>
</header>

<div class="menu">
  <button onclick="mostrar('dashboard')">📊 Dashboard</button>
  <button onclick="mostrar('agenda')">📅 Agenda</button>
  <button onclick="mostrar('servicos')">💰 Serviços</button>
  <button onclick="mostrar('barbeiros')">✂️ Barbeiros</button>
</div>

<div class="container">

  <!-- DASHBOARD -->
  <div id="dashboard" class="section">
    <div class="dashboard">
      <div class="card" id="totalAgendamentos">0</div>
      <div class="card" id="faturamento">R$ 0</div>
      <div class="card" id="maisVendido">-</div>
    </div>
  </div>

  <!-- AGENDA -->
  <div id="agenda" class="section">
    <div class="top-bar">
      <h2>Agendamentos</h2>
      <input type="date" id="filtroData" onchange="filtrar()">
    </div>

    <div id="listaPedidos"></div>
  </div>

  <!-- SERVIÇOS -->
  <div id="servicos" class="section">
    <h2>Serviços</h2>

    <input id="nomeServico" placeholder="Nome">
    <input id="precoServico" placeholder="Preço">
    <button onclick="cadastrarServico()">Cadastrar</button>

    <ul id="listaServicos"></ul>
  </div>

  <!-- BARBEIROS -->
  <div id="barbeiros" class="section">
    <h2>Barbeiros</h2>

    <input id="nomeBarbeiro" placeholder="Nome">
    <button onclick="cadastrarBarbeiro()">Cadastrar</button>

    <ul id="listaBarbeiros"></ul>
  </div>

</div>

<script src="config.js"></script>

<script>
// ================= MENU =================
function mostrar(secao){
  document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
  document.getElementById(secao).style.display = 'block';
}

mostrar('dashboard');

// ================= DADOS =================
let agendamentosGlobal = [];

// ================= LOAD =================
async function carregarAgendamentos(){
  agendamentosGlobal = await fetch(`${API_URL}/agendamentos`).then(r=>r.json());

  renderAgenda(agendamentosGlobal);
  renderDashboard(agendamentosGlobal);
}

// ================= AGRUPAR =================
function agrupar(lista){
  const grupos = {};

  lista.forEach(a=>{
    if (!grupos[a.grupoId]) grupos[a.grupoId] = [];
    grupos[a.grupoId].push(a);
  });

  return Object.values(grupos);
}

// ================= RENDER AGENDA =================
function renderAgenda(lista){
  const container = document.getElementById('listaPedidos');
  container.innerHTML='';

  const grupos = agrupar(lista);

  grupos.forEach(grupo=>{
    let total = 0;

    const div = document.createElement('div');
    div.className='pedido';

    let html = `<b>Pedido</b><br>`;

    grupo.forEach(a=>{
      if (a.status !== 'cancelado') total += a.valor || 0;

      html += `
        <div class="item ${a.status==='cancelado'?'cancelado':''}">
          ${a.nomeCliente} - ${a.servico} - ${a.data} ${a.hora}
          ${a.status !== 'cancelado'
            ? `<button onclick="cancelar('${a._id}')">Cancelar</button>`
            : ''
          }
        </div>
      `;
    });

    html += `<br><b>Total: R$ ${total}</b>`;

    div.innerHTML = html;
    container.appendChild(div);
  });
}

// ================= DASHBOARD =================
function renderDashboard(lista){
  const ativos = lista.filter(a => a.status !== 'cancelado');

  document.getElementById('totalAgendamentos').innerText =
    `📅 ${ativos.length} agendamentos`;

  const total = ativos.reduce((s,a)=>s+(a.valor||0),0);

  document.getElementById('faturamento').innerText =
    `💰 R$ ${total}`;

  const cont = {};
  ativos.forEach(a=>{
    cont[a.servico] = (cont[a.servico]||0)+1;
  });

  const top = Object.entries(cont).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('maisVendido').innerText =
    `🔥 ${top ? top[0] : '-'}`;
}

// ================= FILTRO =================
function filtrar(){
  const data = filtroData.value;

  if (!data) return renderAgenda(agendamentosGlobal);

  const filtrados = agendamentosGlobal.filter(a => a.data === data);
  renderAgenda(filtrados);
}

// ================= CANCELAR =================
async function cancelar(id){
  await fetch(`${API_URL}/agendamentos/${id}/cancelar`, {
    method:'PUT'
  });

  carregarAgendamentos();
}

// ================= BARBEIROS =================
async function cadastrarBarbeiro(){
  await fetch(`${API_URL}/barbeiros`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ nome:nomeBarbeiro.value })
  });

  nomeBarbeiro.value='';
  carregarBarbeiros();
}

async function carregarBarbeiros(){
  let lista = await fetch(`${API_URL}/barbeiros`).then(r=>r.json());

  listaBarbeiros.innerHTML='';

  lista.forEach(b=>{
    let li=document.createElement('li');
    li.innerText = b.nome;
    listaBarbeiros.appendChild(li);
  });
}

// ================= SERVIÇOS =================
async function cadastrarServico(){
  await fetch(`${API_URL}/servicos`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      nome:nomeServico.value,
      preco:precoServico.value
    })
  });

  nomeServico.value='';
  precoServico.value='';
  carregarServicos();
}

async function carregarServicos(){
  let lista = await fetch(`${API_URL}/servicos`).then(r=>r.json());

  listaServicos.innerHTML='';

  lista.forEach(s=>{
    let li=document.createElement('li');
    li.innerText = `${s.nome} - R$ ${s.preco}`;
    listaServicos.appendChild(li);
  });
}

// ================= INIT =================
carregarBarbeiros();
carregarServicos();
carregarAgendamentos();

</script>

</body>
</html>
