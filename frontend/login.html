<!DOCTYPE html>
<html>
<head>
  <title>Login Barbearia</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .card {
      background: #1e1e1e;
      padding: 20px;
      margin: 100px auto;
      width: 300px;
      border-radius: 10px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #00c853;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .erro {
      color: #ff5252;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>💈 Login</h2>

  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button id="btnLogin" onclick="login()">Entrar</button>

  <p id="erro" class="erro"></p>
</div>

<!-- 🔥 IMPORTA CONFIG PRIMEIRO -->
<script src="config.js"></script>

<script>

async function login() {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value.trim();
  const btn = document.getElementById('btnLogin');
  const erroEl = document.getElementById('erro');

  erroEl.innerText = '';

  if (!email || !senha) {
    erroEl.innerText = 'Preencha email e senha';
    return;
  }

  btn.disabled = true;
  btn.innerText = 'Entrando...';

  try {
    const res = await fetch(`${API_URL}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha })
    });

    const data = await res.json();

    if (!res.ok) {
      erroEl.innerText = data.erro || 'Login inválido';
      btn.disabled = false;
      btn.innerText = 'Entrar';
      return;
    }

    localStorage.setItem('token', data.token);

    window.location.href = 'admin.html';

  } catch (erro) {
    console.error(erro);
    erroEl.innerText = 'Erro ao conectar com o servidor';
    btn.disabled = false;
    btn.innerText = 'Entrar';
  }
}

</script>

</body>
</html>
