<!DOCTYPE html>
<html>
<head>
  <title>Barbearia</title>

  <style>
    body { background: #111; color: white; font-family: Arial; text-align: center; }
    .card { background: #1e1e1e; padding: 20px; margin: 20px auto; width: 320px; border-radius: 10px; }
    input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; }
    button { background: #00c853; color: white; cursor: pointer; }
    .hora { display: inline-block; padding: 10px; margin: 5px; background: #2a2a2a; cursor: pointer; border-radius: 8px; }
    .selecionado { background: #00c853 !important; }
    .agendamento { background: #2a2a2a; margin: 10px; padding: 10px; border-radius: 8px; }
    .cancelado { opacity: 0.5; text-decoration: line-through; }
    .btn-cancelar { background: #ff5252; margin-top: 10px; }
  </style>
</head>

<body>

<h1>💈 Barbearia</h1>
<h2 id="boasVindas"></h2>

<div class="card">
  <button onclick="logout()">Sair</button>

  <input id="nome" placeholder="Seu nome">
  <input id="telefone" placeholder="Telefone">

  <select id="servico" onchange="atualizarPreco()"></select>
  <p id="preco">Valor: R$0</p>

  <select id="barbeiro" onchange="gerarHorarios(); carregarHorariosOcupados();"></select>
  <input type="date" id="data" onchange="gerarHorarios(); carregarHorariosOcupados();">

  <div id="horarios"></div>

  <button onclick="agendar()">Agendar</button>
</div>

<div class="card">
  <h3>Meus Agendamentos</h3>
  <div id="meusAgendamentos"></div>
</div>

<script src="config.js"></script>

<script>
const usuarioLogado = JSON.parse(localStorage.getItem('usuario'));

if (!usuarioLogado) {
  alert('Faça login');
  window.location.href = 'usuario.html';
}

document.getElementById('boasVindas').innerHTML =
  `👋 Bem-vindo, <b>${usuarioLogado.nome}</b>`;

function logout() {
  localStorage.removeItem('usuario');
  window.location.href = 'usuario.html';
}

let horaSelecionada = null;
let agendamentoEditando = null;
let total = 0;

// horários
function gerarHorarios() {
  const container = document.getElementById('horarios');
  container.innerHTML = '';

  ["09:00","09:30","10:00","10:30","11:00","11:30","14:00","14:30","15:00","15:30","16:00"]
  .forEach(h => {
    const div = document.createElement('div');
    div.innerText = h;
    div.className = 'hora';

    div.onclick = () => {
      document.querySelectorAll('.hora').forEach(el => el.classList.remove('selecionado'));
      div.classList.add('selecionado');
      horaSelecionada = h;
    };

    container.appendChild(div);
  });
}

// agendar / remarcar
async function agendar() {
  const nome = document.getElementById('nome').value;
  const telefone = document.getElementById('telefone').value;
  const barbeiro = document.getElementById('barbeiro').value;
  const data = document.getElementById('data').value;

  const servicoSelect = document.getElementById('servico');
  const servicoTexto = servicoSelect.options[servicoSelect.selectedIndex].text;
  const valor = Number(servicoSelect.value);

  if (!horaSelecionada) return alert('Selecione horário');

  if (agendamentoEditando) {
    await fetch(`${API_URL}/agendamentos/${agendamentoEditando._id}/remarcar`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ data, hora: horaSelecionada, barbeiro })
    });

    alert('Remarcado!');
    agendamentoEditando = null;

  } else {
    await fetch(`${API_URL}/agendamentos`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        clienteId: usuarioLogado._id,
        nomeCliente: nome,
        telefone,
        servico: servicoTexto,
        valor,
        barbeiro,
        data,
        hora: horaSelecionada
      })
    });

    total += valor;
    alert(`Agendado! Total: R$ ${total}`);
  }

  carregarMeusAgendamentos();
}

// abrir remarcar
function abrirRemarcacao(a) {
  agendamentoEditando = a;
  document.getElementById('data').value = a.data;
  gerarHorarios();
}

// listar
async function carregarMeusAgendamentos() {
  const res = await fetch(`${API_URL}/agendamentos/cliente/${usuarioLogado._id}`);
  const lista = await res.json();

  const container = document.getElementById('meusAgendamentos');
  container.innerHTML = '';

  lista.forEach(a => {
    const div = document.createElement('div');
    div.className = 'agendamento';

    if (a.status === 'cancelado') div.classList.add('cancelado');

    div.innerHTML = `
      <b>${a.servico}</b><br>
      ${a.data} ${a.hora}<br>
      ${a.status}
    `;

    if (a.status === 'ativo') {

      const btnCancelar = document.createElement('button');
      btnCancelar.innerText = 'Cancelar';
      btnCancelar.className = 'btn-cancelar';

      btnCancelar.onclick = async () => {
        await fetch(`${API_URL}/agendamentos/${a._id}/cancelar`, { method: 'PUT' });
        carregarMeusAgendamentos();
      };

      const btnRemarcar = document.createElement('button');
      btnRemarcar.innerText = 'Remarcar';
      btnRemarcar.onclick = () => abrirRemarcacao(a);

      div.appendChild(btnCancelar);
      div.appendChild(btnRemarcar);
    }

    container.appendChild(div);
  });
}

// carregar dados
async function carregarServicos() {
  const res = await fetch(`${API_URL}/servicos`);
  const lista = await res.json();

  const select = document.getElementById('servico');
  select.innerHTML = '';

  lista.forEach(s => {
    const option = document.createElement('option');
    option.value = s.preco;
    option.text = `${s.nome} - R$ ${s.preco}`;
    select.appendChild(option);
  });

  atualizarPreco();
}

function atualizarPreco() {
  document.getElementById('preco').innerText =
    `Valor: R$ ${document.getElementById('servico').value}`;
}

async function carregarBarbeiros() {
  const res = await fetch(`${API_URL}/barbeiros`);
  const lista = await res.json();

  const select = document.getElementById('barbeiro');
  select.innerHTML = '';

  lista.forEach(b => {
    const option = document.createElement('option');
    option.value = b.nome;
    option.text = b.nome;
    select.appendChild(option);
  });
}

// init
carregarBarbeiros();
carregarServicos();
gerarHorarios();
carregarMeusAgendamentos();
</script>

</body>
</html>
