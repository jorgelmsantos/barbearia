<!DOCTYPE html>
<html>
<head>
  <title>Barbearia</title>

  <style>
    body {
      background:#111;
      color:white;
      font-family:Arial;
      margin:0;
    }

    h1, h2, h3 {
      text-align:center;
    }

    .container {
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .card {
      background:#1e1e1e;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    button {
      padding:10px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      background:#00c853;
      color:white;
      width:100%;
      margin-top:10px;
    }

    /* SERVIÇOS */
    .grid {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .item {
      flex:1;
      min-width:120px;
      background:#2a2a2a;
      padding:15px;
      border-radius:10px;
      cursor:pointer;
      text-align:center;
    }

    .item.selected {
      background:#00c853;
    }

    /* BARBEIROS */
    .barbeiro {
      flex:1;
      min-width:120px;
      background:#2a2a2a;
      padding:15px;
      border-radius:10px;
      text-align:center;
      cursor:pointer;
    }

    .barbeiro.selected {
      background:#00c853;
    }

    /* HORÁRIOS */
    .horarios {
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }

    .hora {
      background:#2a2a2a;
      padding:10px;
      border-radius:8px;
      cursor:pointer;
      min-width:70px;
      text-align:center;
    }

    .hora.selected {
      background:#00c853;
    }

    .hora.blocked {
      background:#555;
      cursor:not-allowed;
    }

    /* CARRINHO */
    .item-carrinho {
      background:#2a2a2a;
      padding:10px;
      border-radius:8px;
      margin:5px 0;
    }

    .agendamento {
      background:#2a2a2a;
      padding:10px;
      border-radius:8px;
      margin:10px 0;
    }

    .cancelado {
      text-decoration:line-through;
      opacity:0.5;
    }

    .btn-cancelar {
      background:#ff5252;
      margin-top:5px;
    }

    input {
      width:100%;
      padding:10px;
      margin:10px 0;
      border-radius:8px;
      border:none;
    }
  </style>
</head>

<body>

<div class="container">

<h1>💈 Barbearia</h1>
<h2 id="boasVindas"></h2>

<div class="card">
  <button onclick="logout()">Sair</button>

  <input id="telefone" placeholder="📱 WhatsApp">

  <h3>Escolha o serviço</h3>
  <div id="servicos" class="grid"></div>

  <h3>Escolha o barbeiro</h3>
  <div id="barbeiros" class="grid"></div>

  <h3>Escolha a data</h3>
  <input type="date" id="data">

  <h3>Horários</h3>
  <div id="horarios" class="horarios"></div>

  <button onclick="add()">➕ Adicionar ao carrinho</button>
</div>

<div class="card">
  <h3>🛒 Carrinho</h3>
  <div id="carrinho"></div>
  <h3 id="total"></h3>

  <select id="pagamento">
    <option value="local">Pagar no local</option>
    <option value="pix">Pagar com PIX</option>
  </select>

  <button onclick="finalizar()">✅ Finalizar</button>
</div>

<div class="card">
  <h3>📅 Meus pedidos</h3>
  <div id="lista"></div>
</div>

</div>

<script src="config.js"></script>

<script>
// ================= USER =================
let user = JSON.parse(localStorage.getItem('usuario'));

if (!user) {
  alert('Faça login');
  location = 'usuario.html';
}

boasVindas.innerText = `👋 ${user.nome}`;

// ================= STATE =================
let servicoSelecionado = null;
let barbeiroSelecionado = null;
let horaSelecionada = null;
let carrinho = [];
let horariosOcupados = [];

// ================= SERVIÇOS =================
async function carregar(){
  let s = await fetch(`${API_URL}/servicos`).then(r=>r.json());
  let b = await fetch(`${API_URL}/barbeiros`).then(r=>r.json());

  servicos.innerHTML='';
  barbeiros.innerHTML='';

  s.forEach(x=>{
    let div=document.createElement('div');
    div.className='item';
    div.innerHTML=`${x.nome}<br>R$ ${x.preco}`;

    div.onclick=()=>{
      servicoSelecionado = x;
      document.querySelectorAll('.item').forEach(e=>e.classList.remove('selected'));
      div.classList.add('selected');
    };

    servicos.appendChild(div);
  });

  b.forEach(x=>{
    let div=document.createElement('div');
    div.className='barbeiro';
    div.innerHTML=x.nome;

    div.onclick=()=>{
      barbeiroSelecionado = x;
      document.querySelectorAll('.barbeiro').forEach(e=>e.classList.remove('selected'));
      div.classList.add('selected');
    };

    barbeiros.appendChild(div);
  });
}

// ================= HORÁRIOS =================
function gerarHorarios(){
  const horas = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00"];

  horarios.innerHTML='';

  horas.forEach(h=>{
    let div=document.createElement('div');
    div.className='hora';
    div.innerText=h;

    const ocupadoBanco = horariosOcupados.includes(h);
    const ocupadoCarrinho = carrinho.find(i=>i.hora===h && i.data===data.value);

    if (ocupadoBanco || ocupadoCarrinho) {
      div.classList.add('blocked');
    } else {
      div.onclick=()=>{
        horaSelecionada=h;
        document.querySelectorAll('.hora').forEach(e=>e.classList.remove('selected'));
        div.classList.add('selected');
      };
    }

    horarios.appendChild(div);
  });
}

// ================= ADD =================
function add(){
  if (!servicoSelecionado || !barbeiroSelecionado || !horaSelecionada || !data.value) {
    return alert('Preencha tudo');
  }

  carrinho.push({
    servico: servicoSelecionado.nome,
    valor: servicoSelecionado.preco,
    barbeiro: barbeiroSelecionado.nome,
    data: data.value,
    hora: horaSelecionada
  });

  horaSelecionada=null;
  gerarHorarios();
  render();
}

// ================= CARRINHO =================
function render(){
  carrinhoDiv.innerHTML='';
  let total=0;

  carrinho.forEach((i,idx)=>{
    total+=i.valor;

    let div=document.createElement('div');
    div.className='item-carrinho';

    div.innerHTML=`
      ${i.servico} - ${i.data} ${i.hora}<br>
      R$ ${i.valor}
      <button onclick="rem(${idx})">Remover</button>
    `;

    carrinhoDiv.appendChild(div);
  });

  totalDiv.innerText="💰 Total: R$ "+total;
}

function rem(i){
  carrinho.splice(i,1);
  gerarHorarios();
  render();
}

// ================= FINALIZAR =================
async function finalizar(){
  let formaPagamento = pagamento.value;

  let res = await fetch(`${API_URL}/agendamentos/lote`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      clienteId:user._id,
      nomeCliente:user.nome,
      telefone:telefone.value,
      formaPagamento,
      itens:carrinho
    })
  });

  let dataRes = await res.json();

  if (formaPagamento === 'pix' && dataRes.pix) {
    alert(`PIX gerado:\n${dataRes.pix.copiaCola}`);
  }

  carrinho=[];
  render();
  load();
}

// ================= LISTA =================
async function load(){
  let res = await fetch(`${API_URL}/agendamentos/cliente/${user._id}`);
  let lista = await res.json();

  listaDiv.innerHTML='';

  lista.forEach(p=>{
    let div=document.createElement('div');
    div.className='agendamento';

    let html=`<b>Pedido</b><br>Total: R$ ${p.total}<br><br>`;

    p.itens.forEach(i=>{
      html+=`
        <div class="${i.status==='cancelado'?'cancelado':''}">
          ${i.servico} - ${i.data} ${i.hora}
          ${i.status==='ativo'
            ? `<button class="btn-cancelar" onclick="cancelar('${i._id}')">Cancelar</button>`
            : ''
          }
        </div>
      `;
    });

    div.innerHTML=html;
    listaDiv.appendChild(div);
  });
}

// ================= CANCELAR =================
async function cancelar(id){
  await fetch(`${API_URL}/agendamentos/${id}/cancelar`,{method:'PUT'});
  load();
}

// ================= OCUPADOS =================
async function carregarOcupados(){
  if (!data.value) return;

  let res = await fetch(`${API_URL}/agendamentos`);
  let lista = await res.json();

  horariosOcupados = lista
    .filter(a => a.data === data.value && a.status !== 'cancelado')
    .map(a => a.hora);

  gerarHorarios();
}

data.addEventListener('change', carregarOcupados);

// ================= LOGOUT =================
function logout(){
  localStorage.clear();
  location='usuario.html';
}

// ================= INIT =================
carregar();
load();
gerarHorarios();

// refs
const carrinhoDiv = document.getElementById('carrinho');
const totalDiv = document.getElementById('total');
const listaDiv = document.getElementById('lista');
</script>

</body>
</html>
