<!DOCTYPE html>
<html>
<head>
  <title>Barbearia</title>

  <style>
    body { background:#111; color:white; font-family:Arial; text-align:center; }

    .card {
      background:#1e1e1e;
      padding:20px;
      margin:20px auto;
      width:360px;
      border-radius:12px;
    }

    input, select, button {
      width:100%;
      padding:10px;
      margin:5px 0;
      border-radius:6px;
      border:none;
    }

    button { background:#00c853; color:white; cursor:pointer; }

    .hora {
      display:inline-block;
      padding:10px;
      margin:5px;
      background:#2a2a2a;
      cursor:pointer;
      border-radius:8px;
    }

    .selecionado { background:#00c853 !important; }
    .bloqueado { background:#555 !important; cursor:not-allowed; }

    .item-carrinho, .agendamento {
      background:#2a2a2a;
      padding:10px;
      margin:5px;
      border-radius:8px;
      text-align:left;
    }

    .cancelado {
      opacity:0.5;
      text-decoration:line-through;
    }

    .btn-cancelar {
      background:#ff5252;
      margin-top:5px;
    }

    .pix-box {
      background:#000;
      padding:10px;
      margin-top:10px;
      border-radius:8px;
      font-size:12px;
      word-break:break-all;
    }

    .status-pago { color: lightgreen; }
    .status-pendente { color: orange; }
  </style>
</head>

<body>

<h1>💈 Barbearia</h1>
<h2 id="boasVindas"></h2>

<div class="card">
  <button onclick="logout()">Sair</button>

  <input id="telefone" placeholder="📱 WhatsApp">

  <select id="servico"></select>
  <select id="barbeiro"></select>
  <input type="date" id="data">

  <div id="horarios"></div>

  <button onclick="add()">➕ Adicionar</button>
</div>

<div class="card">
  <h3>🛒 Carrinho</h3>
  <div id="carrinho"></div>
  <h3 id="total"></h3>
  <button onclick="finalizar()">✅ Finalizar</button>
</div>

<div class="card">
  <h3>📅 Meus pedidos</h3>
  <div id="lista"></div>
</div>

<script src="config.js"></script>

<script>
let user = JSON.parse(localStorage.getItem('usuario'));

if (!user) {
  alert('Faça login');
  location = 'usuario.html';
}

boasVindas.innerText = `👋 ${user.nome}`;

let hora = null;
let carrinho = [];
let horariosOcupados = [];

// ================= HORÁRIOS =================
function gerarHorarios(){
  let h = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00"];
  horarios.innerHTML='';

  h.forEach(x=>{
    let el=document.createElement('div');
    el.innerText=x;
    el.className='hora';

    if (horariosOcupados.includes(x) || carrinho.find(i=>i.hora===x && i.data===data.value)) {
      el.classList.add('bloqueado');
    } else {
      el.onclick=()=>{
        hora=x;
        document.querySelectorAll('.hora').forEach(e=>e.classList.remove('selecionado'));
        el.classList.add('selecionado');
      };
    }

    horarios.appendChild(el);
  });
}

// ================= ADD =================
function add(){
  if (!hora || !data.value || !barbeiro.value) return alert('Preencha tudo');

  let s = servico.options[servico.selectedIndex];

  carrinho.push({
    servico: s.text,
    valor: Number(s.value),
    barbeiro: barbeiro.value,
    data: data.value,
    hora
  });

  hora=null;
  gerarHorarios();
  render();
}

// ================= CARRINHO =================
function render(){
  carrinho.innerHTML='';
  let total=0;

  carrinho.forEach((i,idx)=>{
    total+=i.valor;

    let el=document.createElement('div');
    el.className='item-carrinho';

    el.innerHTML = `
      <b>${i.servico}</b><br>
      ${i.data} ${i.hora}<br>
      R$${i.valor}
      <button onclick="rem(${idx})">Remover</button>
    `;

    carrinho.appendChild(el);
  });

  totalEl.innerText = "💰 Total: R$ "+total;
}

function rem(i){
  carrinho.splice(i,1);
  gerarHorarios();
  render();
}

// ================= FINALIZAR =================
async function finalizar(){
  if (carrinho.length === 0) return alert('Carrinho vazio');

  const res = await fetch(`${API_URL}/agendamentos/lote`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      clienteId:user._id,
      nomeCliente:user.nome,
      telefone:telefone.value,
      itens:carrinho
    })
  });

  const dataRes = await res.json();

  alert(`💳 PIX gerado!\n\n${dataRes.pix.copiaECola}`);

  carrinho=[];
  render();
  load();
}

// ================= PAGAR =================
async function pagar(grupoId){
  await fetch(`${API_URL}/pagamentos/${grupoId}/pagar`, { method:'POST' });
  alert('Pagamento confirmado!');
  load();
}

// ================= LISTA =================
async function load(){
  let res = await fetch(`${API_URL}/agendamentos/cliente/${user._id}`);
  let lista = await res.json();

  listaDiv.innerHTML='';

  lista.forEach(p=>{
    let el=document.createElement('div');
    el.className='agendamento';

    let status = p.statusPagamento === 'pago'
      ? `<span class="status-pago">🟢 Pago</span>`
      : `<span class="status-pendente">🟡 Pendente</span>`;

    let html = `
      <b>Pedido</b><br>
      ${status}<br>
      💰 Total: R$ ${p.total}<br><br>
    `;

    p.itens.forEach(i=>{
      html+=`
        <div class="${i.status==='cancelado'?'cancelado':''}">
          ${i.servico} - ${i.data} ${i.hora}
          ${i.status==='ativo'
            ? `<button class="btn-cancelar" onclick="cancelar('${i._id}')">Cancelar</button>`
            : ''}
        </div>
      `;
    });

    if (p.statusPagamento !== 'pago') {
      html += `
        <button onclick="pagar('${p.grupoId}')">💳 Já paguei</button>
      `;
    }

    el.innerHTML=html;
    listaDiv.appendChild(el);
  });
}

// ================= CANCELAR =================
async function cancelar(id){
  await fetch(`${API_URL}/agendamentos/${id}/cancelar`, { method:'PUT' });
  load();
}

// ================= DADOS =================
async function carregar(){
  let s = await fetch(`${API_URL}/servicos`).then(r=>r.json());
  let b = await fetch(`${API_URL}/barbeiros`).then(r=>r.json());

  s.forEach(x=>{
    let o=document.createElement('option');
    o.value=x.preco;
    o.text=`${x.nome} - R$ ${x.preco}`;
    servico.appendChild(o);
  });

  b.forEach(x=>{
    let o=document.createElement('option');
    o.value=x.nome;
    o.text=x.nome;
    barbeiro.appendChild(o);
  });
}

// ================= OCUPADOS =================
async function carregarOcupados(){
  let res = await fetch(`${API_URL}/agendamentos`);
  let lista = await res.json();

  horariosOcupados = lista
    .filter(a => a.data === data.value && a.status !== 'cancelado')
    .map(a => a.hora);

  gerarHorarios();
}

// ================= INIT =================
data.addEventListener('change', carregarOcupados);
barbeiro.addEventListener('change', carregarOcupados);

function logout(){
  localStorage.clear();
  location='usuario.html';
}

const totalEl = document.getElementById('total');
const listaDiv = document.getElementById('lista');

carregar();
gerarHorarios();
load();
</script>

</body>
</html>
