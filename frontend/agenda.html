<!DOCTYPE html>
<html>
<head>
  <title>Barbearia</title>

  <style>
    body { background: #111; color: white; font-family: Arial; text-align: center; }

    .card {
      background: #1e1e1e;
      padding: 20px;
      margin: 20px auto;
      width: 350px;
      border-radius: 12px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #00c853;
      color: white;
      cursor: pointer;
    }

    .hora {
      display: inline-block;
      padding: 10px;
      margin: 5px;
      background: #2a2a2a;
      cursor: pointer;
      border-radius: 8px;
    }

    .selecionado { background: #00c853 !important; }

    .item-carrinho {
      background: #2a2a2a;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      text-align: left;
    }

    .btn-remover {
      background: #ff5252;
      margin-top: 5px;
    }

    .agendamento {
      background: #2a2a2a;
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
    }

    .cancelado {
      opacity: 0.5;
      text-decoration: line-through;
    }
  </style>
</head>

<body>

<h1>💈 Barbearia</h1>
<h2 id="boasVindas"></h2>

<div class="card">
  <button onclick="logout()">Sair</button>

  <input id="nome" placeholder="Seu nome">
  <input id="telefone" placeholder="Telefone">

  <select id="servico" onchange="atualizarPreco()"></select>
  <p id="preco">Valor: R$0</p>

  <select id="barbeiro"></select>
  <input type="date" id="data">

  <div id="horarios"></div>

  <button onclick="adicionarCarrinho()">➕ Adicionar Serviço</button>
</div>

<!-- 🛒 CARRINHO -->
<div class="card">
  <h3>🛒 Carrinho</h3>
  <div id="carrinho"></div>
  <h3 id="total">Total: R$ 0</h3>

  <button onclick="finalizarAgendamentos()">✅ Finalizar</button>
</div>

<!-- 📅 AGENDAMENTOS -->
<div class="card">
  <h3>Meus Agendamentos</h3>
  <div id="meusAgendamentos"></div>
</div>

<script src="config.js"></script>

<script>
// ================= USUÁRIO =================
let usuarioLogado = JSON.parse(localStorage.getItem('usuario'));

if (!usuarioLogado) {
  alert('Faça login');
  window.location.href = 'usuario.html';
}

// 🔥 ATUALIZA USUÁRIO (PLANO)
async function atualizarUsuario() {
  try {
    const res = await fetch(`${API_URL}/clientes/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email: usuarioLogado.email,
        senha: usuarioLogado.senha
      })
    });

    const data = await res.json();
    usuarioLogado = data.usuario;
    localStorage.setItem('usuario', JSON.stringify(usuarioLogado));

  } catch (err) {
    console.error('Erro ao atualizar usuário');
  }
}

// ================= UI =================
function renderUsuario() {
  document.getElementById('boasVindas').innerHTML =
    `👋 Bem-vindo, <b>${usuarioLogado.nome}</b><br>
     ${usuarioLogado.planoAtivo ? '🔥 Plano Fidelidade ATIVO' : '💳 Sem plano'}`;

  document.getElementById('nome').value = usuarioLogado.nome;
}

function logout() {
  localStorage.removeItem('usuario');
  window.location.href = 'usuario.html';
}

// ================= HORÁRIOS =================
let horaSelecionada = null;

function gerarHorarios() {
  const container = document.getElementById('horarios');
  container.innerHTML = '';

  ["09:00","09:30","10:00","10:30","11:00","11:30","14:00","14:30","15:00","15:30","16:00"]
  .forEach(h => {
    const div = document.createElement('div');
    div.innerText = h;
    div.className = 'hora';

    div.onclick = () => {
      document.querySelectorAll('.hora').forEach(el => el.classList.remove('selecionado'));
      div.classList.add('selecionado');
      horaSelecionada = h;
    };

    container.appendChild(div);
  });
}

// ================= CARRINHO =================
let carrinho = [];

function adicionarCarrinho() {
  const barbeiro = document.getElementById('barbeiro').value;
  const data = document.getElementById('data').value;

  const servicoSelect = document.getElementById('servico');
  const servicoTexto = servicoSelect.options[servicoSelect.selectedIndex].text;
  const valor = Number(servicoSelect.value);

  if (!data || !barbeiro || !horaSelecionada) {
    return alert('Preencha tudo');
  }

  carrinho.push({ servico: servicoTexto, valor, barbeiro, data, hora: horaSelecionada });

  renderCarrinho();
}

function renderCarrinho() {
  const div = document.getElementById('carrinho');
  div.innerHTML = '';

  let total = 0;

  carrinho.forEach((item, index) => {
    total += item.valor;

    const el = document.createElement('div');
    el.className = 'item-carrinho';

    el.innerHTML = `
      <b>${item.servico}</b><br>
      ${item.data} ${item.hora}<br>
      ${item.barbeiro}
      <button class="btn-remover" onclick="removerItem(${index})">Remover</button>
    `;

    div.appendChild(el);
  });

  document.getElementById('total').innerText = `Total: R$ ${total}`;
}

function removerItem(index) {
  carrinho.splice(index, 1);
  renderCarrinho();
}

// ================= FINALIZAR =================
async function finalizarAgendamentos() {
  const telefone = document.getElementById('telefone').value;

  if (!telefone) return alert('Informe telefone');
  if (carrinho.length === 0) return alert('Carrinho vazio');

  try {
    for (let item of carrinho) {
      await fetch(`${API_URL}/agendamentos`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          clienteId: usuarioLogado._id,
          nomeCliente: usuarioLogado.nome,
          telefone,
          ...item
        })
      });
    }

    alert('Agendamentos realizados!');

    carrinho = [];
    renderCarrinho();
    carregarMeusAgendamentos();
    gerarHorarios();

  } catch (err) {
    alert('Erro ao agendar');
  }
}

// ================= LISTAR =================
async function carregarMeusAgendamentos() {
  const res = await fetch(`${API_URL}/agendamentos/cliente/${usuarioLogado._id}`);
  const lista = await res.json();

  const container = document.getElementById('meusAgendamentos');
  container.innerHTML = '';

  lista.forEach(a => {
    const div = document.createElement('div');
    div.className = 'agendamento';

    if (a.status === 'cancelado') div.classList.add('cancelado');

    div.innerHTML = `
      <b>${a.servico}</b><br>
      ${a.data} ${a.hora}<br>
      ${a.status}
    `;

    if (a.status === 'ativo') {
      const btn = document.createElement('button');
      btn.innerText = 'Cancelar';
      btn.className = 'btn-remover';

      btn.onclick = async () => {
        await fetch(`${API_URL}/agendamentos/${a._id}/cancelar`, { method: 'PUT' });
        carregarMeusAgendamentos();
      };

      div.appendChild(btn);
    }

    container.appendChild(div);
  });
}

// ================= DADOS =================
async function carregarServicos() {
  const res = await fetch(`${API_URL}/servicos`);
  const lista = await res.json();

  const select = document.getElementById('servico');
  select.innerHTML = '';

  lista.forEach(s => {
    const option = document.createElement('option');
    option.value = s.preco;
    option.text = `${s.nome} - R$ ${s.preco}`;
    select.appendChild(option);
  });

  atualizarPreco();
}

function atualizarPreco() {
  document.getElementById('preco').innerText =
    `Valor: R$ ${document.getElementById('servico').value}`;
}

async function carregarBarbeiros() {
  const res = await fetch(`${API_URL}/barbeiros`);
  const lista = await res.json();

  const select = document.getElementById('barbeiro');
  select.innerHTML = '';

  lista.forEach(b => {
    const option = document.createElement('option');
    option.value = b.nome;
    option.text = b.nome;
    select.appendChild(option);
  });
}

// ================= INIT =================
(async () => {
  await atualizarUsuario();
  renderUsuario();
  carregarBarbeiros();
  carregarServicos();
  gerarHorarios();
  carregarMeusAgendamentos();
})();
</script>

</body>
</html>
