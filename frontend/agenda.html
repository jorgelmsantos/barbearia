<!DOCTYPE html>
<html>
<head>
  <title>Barbearia</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .card {
      background: #1e1e1e;
      padding: 20px;
      margin: 20px auto;
      width: 320px;
      border-radius: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #00c853;
      color: white;
      cursor: pointer;
    }

    .hora {
      display: inline-block;
      padding: 10px;
      margin: 5px;
      background: #2a2a2a;
      cursor: pointer;
      border-radius: 8px;
    }

    .selecionado {
      background: #00c853 !important;
    }

    .agendamento {
      background: #2a2a2a;
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
    }

    .cancelado {
      opacity: 0.5;
    }

    .btn-cancelar {
      background: #ff5252;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>💈 Barbearia</h1>

<div class="card">
  <button onclick="logout()">Sair</button>

  <input id="nome" placeholder="Seu nome">
  <input id="telefone" placeholder="Telefone">

  <select id="servico" onchange="atualizarPreco()"></select>
  <p id="preco">Valor: R$0</p>

  <select id="barbeiro" onchange="gerarHorarios(); carregarHorariosOcupados();"></select>
  <input type="date" id="data" onchange="gerarHorarios(); carregarHorariosOcupados();">

  <div id="horarios"></div>

  <button onclick="agendar()">Agendar</button>
</div>

<div class="card">
  <h3>Meus Agendamentos</h3>
  <div id="meusAgendamentos"></div>
</div>

<script src="config.js"></script>

<script>

// 🔒 PROTEÇÃO LOGIN
const usuarioLogado = JSON.parse(localStorage.getItem('usuario'));

if (!usuarioLogado) {
  alert('Faça login');
  window.location.href = 'usuario.html';
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem('usuario');
  window.location.href = 'usuario.html';
}

let horaSelecionada = null;

// ================= AGENDAR =================
async function agendar() {
  const nome = document.getElementById('nome').value;
  const telefone = document.getElementById('telefone').value;
  const barbeiro = document.getElementById('barbeiro').value;
  const data = document.getElementById('data').value;

  const servicoSelect = document.getElementById('servico');
  const servicoTexto = servicoSelect.options[servicoSelect.selectedIndex].text;
  const valor = servicoSelect.value;

  if (!horaSelecionada) return alert('Selecione horário');

  await fetch(`${API_URL}/agendamentos`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      clienteId: usuarioLogado._id, // 🔥 VINCULA
      nomeCliente: nome,
      telefone,
      servico: servicoTexto,
      valor,
      barbeiro,
      data,
      hora: horaSelecionada
    })
  });

  alert('Agendado!');
  carregarMeusAgendamentos();
}

// ================= MEUS AGENDAMENTOS =================
async function carregarMeusAgendamentos() {
  const res = await fetch(`${API_URL}/agendamentos/cliente/${usuarioLogado._id}`);
  const lista = await res.json();

  const container = document.getElementById('meusAgendamentos');
  container.innerHTML = '';

  lista.forEach(a => {
    const div = document.createElement('div');
    div.className = 'agendamento';

    if (a.status === 'cancelado') div.classList.add('cancelado');

    div.innerHTML = `
      ${a.servico}<br>
      ${a.data} ${a.hora}<br>
      ${a.status}
    `;

    if (a.status === 'ativo') {
      const btn = document.createElement('button');
      btn.innerText = 'Cancelar';
      btn.className = 'btn-cancelar';

      btn.onclick = async () => {
        await fetch(`${API_URL}/agendamentos/${a._id}/cancelar`, {
          method: 'PUT'
        });

        carregarMeusAgendamentos();
      };

      div.appendChild(btn);
    }

    container.appendChild(div);
  });
}

// ================= INIT =================
carregarBarbeiros();
carregarServicos();
gerarHorarios();
carregarMeusAgendamentos();

</script>

</body>
</html>
