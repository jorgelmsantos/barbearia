<!DOCTYPE html>
<html>
<head>
  <title>Barbearia</title>

  <style>
    body { background:#111; color:white; font-family:Arial; text-align:center; }

    .card {
      background:#1e1e1e;
      padding:20px;
      margin:20px auto;
      width:350px;
      border-radius:12px;
    }

    input, select, button {
      width:100%;
      padding:10px;
      margin:5px 0;
      border-radius:5px;
      border:none;
    }

    button { background:#00c853; color:white; cursor:pointer; }

    .hora {
      display:inline-block;
      padding:10px;
      margin:5px;
      background:#2a2a2a;
      cursor:pointer;
      border-radius:8px;
    }

    .selecionado { background:#00c853 !important; }

    .item-carrinho {
      background:#2a2a2a;
      padding:10px;
      margin:5px;
      border-radius:8px;
      text-align:left;
    }

    .agendamento {
      background:#2a2a2a;
      margin:10px;
      padding:10px;
      border-radius:8px;
      text-align:left;
    }
  </style>
</head>

<body>

<h1>💈 Barbearia</h1>
<h2 id="boasVindas"></h2>

<div class="card">
  <button onclick="logout()">Sair</button>

  <input id="nome" placeholder="Nome">
  <input id="telefone" placeholder="Telefone">

  <select id="servico"></select>
  <select id="barbeiro"></select>
  <input type="date" id="data">

  <div id="horarios"></div>

  <button onclick="add()">Adicionar</button>
</div>

<div class="card">
  <h3>Carrinho</h3>
  <div id="carrinho"></div>
  <h3 id="total"></h3>
  <button onclick="finalizar()">Finalizar</button>
</div>

<div class="card">
  <h3>Meus pedidos</h3>
  <div id="lista"></div>
</div>

<script src="config.js"></script>

<script>
let user = JSON.parse(localStorage.getItem('usuario'));
document.getElementById('boasVindas').innerText = user.nome;

let hora = null;
let carrinho = [];

function horarios(){
  let h = ["09:00","10:00","11:00","14:00","15:00","16:00"];
  let div = document.getElementById('horarios');
  div.innerHTML='';

  h.forEach(x=>{
    let el=document.createElement('div');
    el.innerText=x;
    el.className='hora';
    el.onclick=()=>{
      hora=x;
      document.querySelectorAll('.hora').forEach(e=>e.classList.remove('selecionado'));
      el.classList.add('selecionado');
    };
    div.appendChild(el);
  });
}

function add(){
  let s = servico.options[servico.selectedIndex];
  let item = {
    servico: s.text,
    valor: Number(s.value),
    barbeiro: barbeiro.value,
    data: data.value,
    hora
  };

  carrinho.push(item);
  render();
}

function render(){
  let div = document.getElementById('carrinho');
  div.innerHTML='';
  let total=0;

  carrinho.forEach((i,idx)=>{
    total+=i.valor;
    let el=document.createElement('div');
    el.className='item-carrinho';
    el.innerHTML = `${i.servico} - ${i.data} ${i.hora} <br> R$${i.valor}
    <button onclick="rem(${idx})">X</button>`;
    div.appendChild(el);
  });

  document.getElementById('total').innerText = "Total: "+total;
}

function rem(i){
  carrinho.splice(i,1);
  render();
}

async function finalizar(){
  await fetch(`${API_URL}/agendamentos/lote`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      clienteId:user._id,
      nomeCliente:user.nome,
      telefone:telefone.value,
      itens:carrinho
    })
  });

  carrinho=[];
  render();
  load();
}

async function load(){
  let res = await fetch(`${API_URL}/agendamentos/cliente/${user._id}`);
  let lista = await res.json();

  let div=document.getElementById('lista');
  div.innerHTML='';

  lista.forEach(p=>{
    let el=document.createElement('div');
    el.className='agendamento';

    let html = `<b>Pedido</b><br>Total: ${p.total}<br><br>`;

    p.itens.forEach(i=>{
      html+=`${i.servico} - ${i.data} ${i.hora}<br>`;
    });

    el.innerHTML=html;
    div.appendChild(el);
  });
}

async function carregar(){
  let s = await fetch(`${API_URL}/servicos`).then(r=>r.json());
  let b = await fetch(`${API_URL}/barbeiros`).then(r=>r.json());

  s.forEach(x=>{
    let o=document.createElement('option');
    o.value=x.preco;
    o.text=x.nome;
    servico.appendChild(o);
  });

  b.forEach(x=>{
    let o=document.createElement('option');
    o.value=x.nome;
    o.text=x.nome;
    barbeiro.appendChild(o);
  });
}

function logout(){
  localStorage.clear();
  location='usuario.html';
}

carregar();
horarios();
load();
</script>

</body>
</html>
