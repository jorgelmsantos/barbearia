<!DOCTYPE html>
<html>
<head>
  <title>Barbearia</title>

  <style>
    body { background:#111; color:white; font-family:Arial; text-align:center; }

    .card {
      background:#1e1e1e;
      padding:20px;
      margin:20px auto;
      width:360px;
      border-radius:12px;
    }

    input, select, button {
      width:100%;
      padding:10px;
      margin:5px 0;
      border-radius:6px;
      border:none;
    }

    button { background:#00c853; color:white; cursor:pointer; }

    .hora {
      display:inline-block;
      padding:10px;
      margin:5px;
      background:#2a2a2a;
      cursor:pointer;
      border-radius:8px;
    }

    .selecionado { background:#00c853 !important; }
    .bloqueado { background:#555 !important; cursor:not-allowed; }

    .item-carrinho {
      background:#2a2a2a;
      padding:10px;
      margin:5px;
      border-radius:8px;
      text-align:left;
    }

    .agendamento {
      background:#2a2a2a;
      margin:10px;
      padding:10px;
      border-radius:8px;
      text-align:left;
    }

    .cancelado {
      opacity:0.5;
      text-decoration:line-through;
    }

    .btn-cancelar {
      background:#ff5252;
      margin-top:5px;
    }
  </style>
</head>

<body>

<h1>💈 Barbearia</h1>
<h2 id="boasVindas"></h2>

<div class="card">
  <button onclick="logout()">Sair</button>

  <input id="telefone" placeholder="📱 WhatsApp">

  <select id="servico"></select>
  <select id="barbeiro"></select>
  <input type="date" id="data">

  <div id="horarios"></div>

  <button onclick="add()">➕ Adicionar ao carrinho</button>
</div>

<div class="card">
  <h3>🛒 Carrinho</h3>
  <div id="carrinho"></div>
  <h3 id="total"></h3>
  <button onclick="finalizar()">✅ Finalizar Pedido</button>
</div>

<div class="card">
  <h3>📅 Meus pedidos</h3>
  <div id="lista"></div>
</div>

<script src="config.js"></script>

<script>
// ================= USER =================
let user = JSON.parse(localStorage.getItem('usuario'));

if (!user) {
  alert('Faça login');
  location = 'usuario.html';
}

document.getElementById('boasVindas').innerText = `👋 ${user.nome}`;

// ================= STATE =================
let hora = null;
let carrinho = [];
let horariosOcupados = [];

// ================= HORÁRIOS =================
function gerarHorarios(){
  const horas = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00"];

  const div = document.getElementById('horarios');
  div.innerHTML = '';

  horas.forEach(h => {
    const el = document.createElement('div');
    el.innerText = h;
    el.className = 'hora';

    const ocupadoBanco = horariosOcupados.includes(h);
    const ocupadoCarrinho = carrinho.find(i => i.hora === h && i.data === data.value);

    if (ocupadoBanco || ocupadoCarrinho) {
      el.classList.add('bloqueado');
    } else {
      el.onclick = () => {
        hora = h;
        document.querySelectorAll('.hora').forEach(e => e.classList.remove('selecionado'));
        el.classList.add('selecionado');
      };
    }

    div.appendChild(el);
  });
}

// ================= ADD =================
function add(){
  if (!hora || !data.value || !barbeiro.value) {
    alert('Preencha tudo');
    return;
  }

  const s = servico.options[servico.selectedIndex];

  carrinho.push({
    servico: s.text,
    valor: Number(s.value),
    barbeiro: barbeiro.value,
    data: data.value,
    hora
  });

  hora = null;
  gerarHorarios();
  render();
}

// ================= CARRINHO =================
function render(){
  const div = document.getElementById('carrinho');
  div.innerHTML = '';

  let total = 0;

  carrinho.forEach((i,idx)=>{
    total += i.valor;

    const el = document.createElement('div');
    el.className = 'item-carrinho';

    el.innerHTML = `
      <b>${i.servico}</b><br>
      🧑 ${i.barbeiro}<br>
      📅 ${i.data} ${i.hora}<br>
      💰 R$${i.valor}
      <button onclick="rem(${idx})">Remover</button>
    `;

    div.appendChild(el);
  });

  document.getElementById('total').innerText = "💰 Total: R$ " + total;
}

function rem(i){
  carrinho.splice(i,1);
  gerarHorarios();
  render();
}

// ================= FINALIZAR =================
async function finalizar(){
  if (!telefone.value) return alert('Informe o telefone');
  if (carrinho.length === 0) return alert('Carrinho vazio');

  await fetch(`${API_URL}/agendamentos/lote`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      clienteId:user._id,
      nomeCliente:user.nome,
      telefone:telefone.value,
      itens:carrinho
    })
  });

  alert('✅ Pedido realizado!');

  carrinho = [];
  render();
  load();
  carregarOcupados();
}

// ================= LISTA =================
async function load(){
  const res = await fetch(`${API_URL}/agendamentos/cliente/${user._id}`);
  const lista = await res.json();

  const div = document.getElementById('lista');
  div.innerHTML = '';

  lista.forEach(p=>{
    const el = document.createElement('div');
    el.className = 'agendamento';

    let html = `<b>🧾 Pedido</b><br>💰 Total: R$ ${p.total}<br><br>`;

    p.itens.forEach(i=>{
      html += `
        <div class="${i.status==='cancelado'?'cancelado':''}">
          ${i.servico} - ${i.data} ${i.hora}
          ${i.status==='ativo'
            ? `<button class="btn-cancelar" onclick="cancelar('${i._id}')">Cancelar</button>`
            : ''
          }
        </div>
      `;
    });

    el.innerHTML = html;
    div.appendChild(el);
  });
}

// ================= CANCELAR =================
async function cancelar(id){
  await fetch(`${API_URL}/agendamentos/${id}/cancelar`, {
    method:'PUT'
  });

  load();
  carregarOcupados();
}

// ================= DADOS =================
async function carregar(){
  const s = await fetch(`${API_URL}/servicos`).then(r=>r.json());
  const b = await fetch(`${API_URL}/barbeiros`).then(r=>r.json());

  servico.innerHTML = '';
  barbeiro.innerHTML = '';

  s.forEach(x=>{
    const o=document.createElement('option');
    o.value=x.preco;
    o.text=`${x.nome} - R$ ${x.preco}`;
    servico.appendChild(o);
  });

  b.forEach(x=>{
    const o=document.createElement('option');
    o.value=x.nome;
    o.text=x.nome;
    barbeiro.appendChild(o);
  });
}

// ================= HORÁRIOS OCUPADOS =================
async function carregarOcupados(){
  if (!data.value) return;

  const res = await fetch(`${API_URL}/agendamentos`);
  const lista = await res.json();

  horariosOcupados = lista
    .filter(a => a.data === data.value && a.status !== 'cancelado')
    .map(a => a.hora);

  gerarHorarios();
}

// ================= EVENTS =================
data.addEventListener('change', carregarOcupados);
barbeiro.addEventListener('change', carregarOcupados);

// ================= LOGOUT =================
function logout(){
  localStorage.clear();
  location='usuario.html';
}

// ================= INIT =================
carregar();
load();
gerarHorarios();
</script>

</body>
</html>
