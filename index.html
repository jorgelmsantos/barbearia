<!DOCTYPE html>
<html>
<head>
  <title>Barbearia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .card {
      background: #1e1e1e;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #00c853;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>💈 Barbearia</h1>

  <div class="card">
    <input id="nome" placeholder="Nome">
    <input id="telefone" placeholder="Telefone">

    <select id="servico"></select>

    <input id="data" type="date">
    <input id="hora" type="time">

    <button onclick="agendar()">Agendar</button>
  </div>

  <div class="card">
    <h3>Agenda</h3>
    <ul id="lista"></ul>
  </div>

<script>
async function carregarServicos() {
  const res = await fetch('http://localhost:3000/servicos');
  const servicos = await res.json();

  const select = document.getElementById('servico');
  select.innerHTML = '';

  servicos.forEach(s => {
    const option = document.createElement('option');
    option.value = s.id;
    option.text = `${s.nome} - R$${s.preco}`;
    select.appendChild(option);
  });
}

async function agendar() {
  const nome = document.getElementById('nome').value;
  const telefone = document.getElementById('telefone').value;
  const servicoId = document.getElementById('servico').value;
  const data = document.getElementById('data').value;
  const hora = document.getElementById('hora').value;

  const clienteRes = await fetch('http://localhost:3000/clientes', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nome, telefone })
  });

  const cliente = await clienteRes.json();

  const res = await fetch('http://localhost:3000/agendamentos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ clienteId: cliente.id, servicoId, data, hora })
  });

  if (res.status !== 200) {
    alert('Horário já ocupado');
    return;
  }

  alert('Agendado!');
  carregarAgenda();
}

async function carregarAgenda() {
  const res = await fetch('http://localhost:3000/agendamentos');
  const lista = await res.json();

  const ul = document.getElementById('lista');
  ul.innerHTML = '';

  lista.forEach(a => {
    const li = document.createElement('li');
    li.innerText = `${a.data} - ${a.hora}`;
    ul.appendChild(li);
  });
}

carregarServicos();
carregarAgenda();
</script>

</body>
</html>
